# XcodeGen spec for the Recallyx macOS app.
#
# This is an *additive*, optional developer convenience: it builds the existing
# macOS app target against the local RecallyxCore SPM package, giving an Xcode
# run/debug path and the foundation for a future iOS target. The shipping macOS
# release path (scripts/bundle.sh + scripts/make-dmg.sh) is unaffected.
#
# Generate the project with:  xcodegen generate
# The generated Recallyx.xcodeproj/ is gitignored (regenerate it any time).
#
# Signing is automatic. The development team is injected only via a local,
# gitignored Local.xcconfig — copy Local.xcconfig.example to Local.xcconfig and
# set your own team id. No team identifier is ever committed.

name: Recallyx

options:
  bundleIdPrefix: io.github.macrosak
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

packages:
  RecallyxCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: io.github.macrosak.recallyx

targets:
  Recallyx:
    type: application
    platform: macOS
    sources:
      - path: Sources/Recallyx
        excludes:
          - Resources/**
      - path: Sources/Recallyx/Resources/AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: RecallyxCore
        product: RecallyxCore
    settings:
      base:
        INFOPLIST_FILE: Sources/Recallyx/Resources/Info.plist
        PRODUCT_NAME: Recallyx
        PRODUCT_BUNDLE_IDENTIFIER: io.github.macrosak.recallyx
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: NO
        # Menu-bar / agent app: no Dock icon (mirrors LSUIElement in Info.plist).
        # No app-sandbox / iCloud entitlements yet — those arrive with the iOS
        # target and CloudKit work in a later phase.
