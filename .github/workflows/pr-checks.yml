name: PR checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test
    runs-on: macos-26
    # A hung test run should fail fast, not burn six hours of runner time.
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        # script(1) gives swift test a pty: output is line-buffered, so if a
        # run hangs and times out, the log still shows which test was running
        # (raw pipe output dies unflushed with the process). Exit status is
        # propagated.
        run: script -q /dev/null swift test
